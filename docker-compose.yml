# =============================================================
# docker-compose.yml — Minecraft Quest (Dokploy + Traefik)
# =============================================================
# Comandos rápidos (deploy local):
#   Subir:    docker compose up -d --build
#   Logs:     docker compose logs -f
#   Parar:    docker compose down
#
# No Dokploy: tipo "Compose", apontando para este arquivo.
# Portal e landing são expostos pelo Traefik (sem publicar porta
# no host). Só SSH (2222) e Minecraft (25565) publicam no host.
# =============================================================

services:
  # ── Container do filho: SSH + sessao.py + Minecraft ──────────
  minecraft-quest:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Versão do Paper. Veja: https://papermc.io/downloads/paper
        MC_VERSION: ${MC_VERSION:-1.21.4}
    container_name: minecraft-quest
    restart: unless-stopped

    environment:
      JOGADOR_SENHA: ${JOGADOR_SENHA:-minecraft123}
      MC_RAM_MIN: ${MC_RAM_MIN:-512M}
      MC_RAM_MAX: ${MC_RAM_MAX:-1G}
      SESSAO_MINUTOS: ${SESSAO_MINUTOS:-30}
      LEITURA_MINUTOS: ${LEITURA_MINUTOS:-30}

    ports:
      - "${SSH_PORT:-2222}:22"       # SSH do filho (porta livre no host)
      - "${MC_PORT:-25565}:25565"    # Minecraft

    volumes:
      - minecraft-world:/home/jogador/minecraft/world
      - minecraft-data:/home/jogador/minecraft
      - sessao-data:/data

    mem_limit: ${CONTAINER_MEMORY:-1500m}
    mem_reservation: 512m

  # ── Portal do pai (painel admin) — via Traefik ───────────────
  portal:
    build:
      context: ./portal
      dockerfile: Dockerfile
    container_name: minecraft-portal
    restart: unless-stopped
    environment:
      PORTAL_SENHA: ${PORTAL_SENHA:-pai-vinny}
      SESSAO_MINUTOS: ${SESSAO_MINUTOS:-30}
    volumes:
      - sessao-data:/data
    networks:
      - default
      - dokploy-network
    mem_limit: 256m
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=dokploy-network"
      - "traefik.http.routers.portalpai.rule=Host(`${ADMIN_DOMAIN:-adminvgtux.vsanexus.com}`)"
      - "traefik.http.routers.portalpai.entrypoints=websecure"
      - "traefik.http.routers.portalpai.tls.certresolver=letsencrypt"
      - "traefik.http.services.portalpai.loadbalancer.server.port=8080"

  # ── Landing page pública — via Traefik ───────────────────────
  landing:
    build:
      context: ./landing
      dockerfile: Dockerfile
    container_name: minecraft-landing
    restart: unless-stopped
    networks:
      - dokploy-network
    mem_limit: 64m
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=dokploy-network"
      - "traefik.http.routers.landing.rule=Host(`${LANDING_DOMAIN:-vgtux.vsanexus.com}`)"
      - "traefik.http.routers.landing.entrypoints=websecure"
      - "traefik.http.routers.landing.tls.certresolver=letsencrypt"
      - "traefik.http.services.landing.loadbalancer.server.port=80"

volumes:
  minecraft-world:
  minecraft-data:
  sessao-data:

networks:
  # Rede do Dokploy (Traefik). Criada pelo Dokploy como attachable.
  dokploy-network:
    external: true
