# =============================================================
# docker-compose.yml — Minecraft Quest (Dokploy + Traefik)
# =============================================================
# Comandos rápidos (deploy local):
#   Subir:    docker compose up -d --build
#   Logs:     docker compose logs -f
#   Parar:    docker compose down
#
# No Dokploy: tipo "Compose", apontando para este arquivo.
# Terminal da quest e portal são expostos pelo Traefik (sem publicar
# porta no host). Só o Minecraft (25565) publica no host.
# =============================================================

services:
  # ── Container do filho: terminal web (ttyd) + quest + Minecraft ──
  minecraft-quest:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Versão do Paper. Veja: https://papermc.io/downloads/paper
        MC_VERSION: ${MC_VERSION:-1.21.4}
    container_name: minecraft-quest
    restart: unless-stopped

    environment:
      JOGADOR_SENHA: ${JOGADOR_SENHA:-minecraft123}
      MC_RAM_MIN: ${MC_RAM_MIN:-512M}
      MC_RAM_MAX: ${MC_RAM_MAX:-1G}
      SESSAO_MINUTOS: ${SESSAO_MINUTOS:-30}
      LEITURA_MINUTOS: ${LEITURA_MINUTOS:-30}
      ETAPAS_POR_DIA: ${ETAPAS_POR_DIA:-2}
      # A partir desta etapa, o resumo é no papel + foto (em vez de digitado)
      FOTO_A_PARTIR: ${FOTO_A_PARTIR:-10}
      # Usado para montar o link do resumo no portal (mostrado no terminal)
      ADMIN_DOMAIN: ${ADMIN_DOMAIN:-adminvgtux.vsanexus.com}

    ports:
      - "${MC_PORT:-25565}:25565"    # Minecraft (cliente do jogo conecta aqui)

    volumes:
      # Casa do filho: persiste a pasta 'aventura' (etapas) + o servidor/mundo Minecraft
      - jogador-home:/home/jogador
      # Estado compartilhado com o portal (progresso, resumos, heartbeat)
      - sessao-data:/data

    # Só a rede do Dokploy (Traefik). NÃO fica na rede 'default' — o portal
    # troca estado com a quest pelo volume /data, não pela rede.
    networks:
      - dokploy-network

    # ── Endurecimento / isolamento (defense-in-depth) ──────────
    # O filho já é não-root (su - jogador). Aqui reduzimos o blast radius:
    security_opt:
      - "no-new-privileges:true"   # bloqueia escalonamento via setuid (su/sudo) pelo filho
    cap_drop:
      - ALL                        # remove todas as capabilities...
    cap_add:                       # ...e devolve só o mínimo p/ su/login/PAM + chown do entrypoint
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETUID
      - SETGID
      - SETPCAP
      - AUDIT_WRITE
    pids_limit: 200                # barra fork-bomb
    cpus: "1.5"                    # limite de CPU
    mem_limit: ${CONTAINER_MEMORY:-1500m}
    mem_reservation: 512m

    # Terminal web (ttyd) servido sob /app no mesmo domínio. A casca PWA
    # (serviço terminal-shell) fica na raiz e embute o terminal num iframe.
    # Senha = HTTP Basic Auth do próprio ttyd (JOGADOR_SENHA).
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=dokploy-network"
      - "traefik.http.routers.questterm.rule=Host(`${TERMINAL_DOMAIN:-vgtux.vsanexus.com}`) && PathPrefix(`/app`)"
      - "traefik.http.routers.questterm.priority=100"
      - "traefik.http.routers.questterm.entrypoints=websecure"
      - "traefik.http.routers.questterm.tls.certresolver=letsencrypt"
      - "traefik.http.services.questterm.loadbalancer.server.port=7681"

  # ── Portal do pai (painel admin) — via Traefik ───────────────
  portal:
    build:
      context: ./portal
      dockerfile: Dockerfile
    container_name: minecraft-portal
    restart: unless-stopped
    environment:
      PORTAL_SENHA: ${PORTAL_SENHA:-pai-vinny}
      SESSAO_MINUTOS: ${SESSAO_MINUTOS:-30}
      ETAPAS_POR_DIA: ${ETAPAS_POR_DIA:-2}
    volumes:
      - sessao-data:/data
    networks:
      - default
      - dokploy-network
    mem_limit: 256m
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=dokploy-network"
      - "traefik.http.routers.portalpai.rule=Host(`${ADMIN_DOMAIN:-adminvgtux.vsanexus.com}`)"
      - "traefik.http.routers.portalpai.entrypoints=websecure"
      - "traefik.http.routers.portalpai.tls.certresolver=letsencrypt"
      - "traefik.http.services.portalpai.loadbalancer.server.port=8080"

  # ── Casca PWA do terminal (raiz de TERMINAL_DOMAIN) ──────────
  # Serve o app instalável (manifest/ícones/SW) e embute o ttyd (/app)
  # num iframe. Roteador de menor prioridade: pega tudo que não é /app.
  terminal-shell:
    build:
      context: ./terminal-shell
      dockerfile: Dockerfile
    container_name: minecraft-terminal-shell
    restart: unless-stopped
    networks:
      - dokploy-network
    mem_limit: 64m
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=dokploy-network"
      - "traefik.http.routers.questshell.rule=Host(`${TERMINAL_DOMAIN:-vgtux.vsanexus.com}`)"
      - "traefik.http.routers.questshell.priority=1"
      - "traefik.http.routers.questshell.entrypoints=websecure"
      - "traefik.http.routers.questshell.tls.certresolver=letsencrypt"
      - "traefik.http.services.questshell.loadbalancer.server.port=80"

volumes:
  jogador-home:
  sessao-data:

networks:
  # Rede do Dokploy (Traefik). Criada pelo Dokploy como attachable.
  dokploy-network:
    external: true
